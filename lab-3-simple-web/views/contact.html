<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAME — Contact</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <header>
    <a href="/" class="logo">NAME</a>
    <nav>
      <a href="/">Home</a>
      <a href="/contact" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <div class="contact-wrap">
      <h1 class="contact-headline">Let's talk.</h1>
      <p class="contact-sub">Currently available for selected freelance opportunities and collaborations. Reach out to discuss your next project or just to say hello.</p>

      <!-- Flash error message if validation fails -->
      <% if (error) { %>
        <p style="color:#c0392b;font-size:14px;margin-bottom:20px;text-align:left;"><%= error %></p>
      <% } %>

      <form method="POST" action="/contact" novalidate>
        <div class="form-fields-border">
          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="email@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              placeholder="Tell me about your project..."
              required
            ></textarea>
          </div>
        </div>

        <button type="submit" class="send-btn">
          SEND MESSAGE
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </form>
    </div>
  </main>

  <footer>
    <p>© 2026. Built with precision.</p>
  </footer>

</body>
</html>
